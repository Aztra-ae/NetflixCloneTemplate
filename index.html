<main>
        <div class="filme-principal">
            <div class="container">
                <h3 class="titulo" id="titulo-pelicula">Hola, Tu</h3>
                <p class="descricao" id="descripcion-pelicula">Bienvenido</p>
                <div class="botoes">
                    <a href="P1.html" target="_blank" id="boton-reproducir" role="button" class="botao">
                        <i class="fas fa-play"></i>
                        VER AHORA
                    </a>
                    <a href="#" role="button" class="botao">
                        <i class="fas fa-info-circle"></i>
                        MÁS INFORMACIÓN
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script>
        function cambiarPelicula(nuevoTitulo, nuevaDescripcion, nuevoEnlace) {
            // Cambia el texto
            document.getElementById('titulo-pelicula').innerText = nuevoTitulo;
            document.getElementById('descripcion-pelicula').innerText = nuevaDescripcion;
            
            // Cambia el enlace del botón
            const boton = document.getElementById('boton-reproducir');
            boton.href = nuevoEnlace;
            
            // Si el enlace es '#', quitamos el target="_blank" para que no abra una pestaña vacía
            if (nuevoEnlace === '#') {
                boton.removeAttribute('target');
            } else {
                boton.setAttribute('target', '_blank');
            }

            // Sube la pantalla
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
