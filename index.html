<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/responsive.css">
    <link rel="stylesheet" href="style/owl/owl.carousel.min.css">
    <link rel="stylesheet" href="style/owl/owl.theme.default.min.css">

    <title>Babel</title>
</head>
<body>
    <header>
        <div class="container">
            <h2 class="logo"><img src="img/Netflix.png" width="999" height="400" alt="Logo Netflix"></h2>
            <nav>
                <a href="index.html">Inicio</a>
                <a href="#">Series</a>
                <a href="#">Películas</a>
                <a href="#">Otros</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="filme-principal">
            <div class="container">
                <h3 class="titulo" id="titulo-pelicula">Hola, Tu</h3>
                <p class="descricao" id="descripcion-pelicula">Bienvenido</p>
                <div class="botoes">
                    <a href="P1.html" target="_blank" id="boton-reproducir" role="button" class="botao">
                        <i class="fas fa-play"></i>
                        VER AHORA
                    </a>
                    <a href="#" role="button" class="botao">
                        <i class="fas fa-info-circle"></i>
                        MÁS INFORMACIÓN
                    </a>
                </div>
            </div>
        </div>
    </main>

    <div class="carrosel-filmes">
        <div class="owl-carousel owl-theme">
            <div class="item"><img class="box-filme" src="img/poster.webp" onclick="cambiarPelicula('La Niebla', '¡Solo tenemos cuatro balas, Pero somo 5!', 'P1.html')"></div>
            <div class="item"><img class="box-filme" src="img/mini2.jpg" onclick="cambiarPelicula('STAR WARS', 'Galaxia lejana...', 'P2.html')"></div>
            <div class="item"><img class="box-filme" src="img/mini3.jpg" onclick="cambiarPelicula('EL HOBBIT', 'Montaña solitaria.', 'P3.html')"></div>
            </div>
    </div>

    <script src="https://kit.fontawesome.com/2c36e9b7b1.js" crossorigin="anonymous"></script>
    <script src="js/owl/jquery.min.js"></script>
    <script src="js/owl/owl.carousel.min.js"></script>
    <script src="js/owl/setup.js"></script>

    <script>
        function cambiarPelicula(titulo, desc, enlace) {
            document.getElementById('titulo-pelicula').innerText = titulo;
            document.getElementById('descripcion-pelicula').innerText = desc;
            document.getElementById('boton-reproducir').href = enlace;
        }
    </script>
</body>
</html>
